<!DOCTYPE html>
{% load static %}
{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }}">{{ message }}</div>
{% endfor %}
{% endif %}
<html>
<head>
<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<!-- Bootstrap CSS -->
< rel="stylesheet" type="text/css" href="_includes/scss/bootstrap.js">
<link rel="stylesheet" type="text/css" href="_includes/scss/bootstrap.bundle.js">
<link rel="stylesheet" type="text/css" href="bootstrap.css">

<title>{{title}}</title>
</head>
<body>

    {% include navigation.html %}
    <h1>{{ page.title }}</h1>
<main><section>
    {{ content }}
</section></main>  
    
    {% include footer.html %}

</body>

</html>
