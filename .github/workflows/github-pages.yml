name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write   # required for deploy-pages action according to docs :contentReference[oaicite:3]{index=3}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # If you have a build step (e.g., compile Sass, bundle JS), add here:
      # - name: Build assets
      #   run: |
      #     npm install
      #     npm run build
      #   # assume build outputs to ./dist

      # If no build step, skip and publish directly
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './'   # or './dist' if your built site lives in dist folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
